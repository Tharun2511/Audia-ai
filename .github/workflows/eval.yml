# AI eval gate (Phase 6.2).
#
# Runs both eval suites on every pull request. Each suite exits non-zero when
# its pass rate drops below 90% — failing this workflow blocks the PR (once
# the workflow is added as a required status check in the GitHub repo settings).
#
# Requires repository secret: GROQ_API_KEY (used by summarizer-under-test,
# RAG-generation-under-test, AND the 70B faithfulness/relevancy judges).
#
# Cost: ~25 model calls per run on Groq's free tier ⇒ effectively $0. If we
# ever upgrade to a paid plan / different provider, this is the line item to
# revisit — see learning/REVISION.md §13 for the "PR fast subset + nightly
# full suite" pattern that scales when each run is no longer free.

name: AI evals

on:
  pull_request:
    # Skip on doc-only / non-AI changes. The evals don't tell us anything
    # useful about a README tweak, so don't burn the rate-limit budget on it.
    paths-ignore:
      - "learning/**"
      - "**/*.md"
      - ".gitignore"
      - "LICENSE"

# Cancel in-flight runs when a new commit lands on the same PR — only the
# latest commit's eval result matters.
concurrency:
  group: evals-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eval:
    name: Run eval suites
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run summarizer eval
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        # The npm script reads .env via --env-file=.env, which doesn't exist
        # in CI. Override by exporting the key into the env, then call the
        # script directly without --env-file. The other flags are unchanged.
        run: node --import tsx --conditions=react-server src/evals/summary.eval.ts

      - name: Run RAG-chat eval
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node --import tsx --conditions=react-server src/evals/chat.eval.ts
